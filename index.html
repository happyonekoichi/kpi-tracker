<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>MedSales</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root {
  --bg:#f5f7fa; --surface:#fff; --surface2:#f0f2f5; --surface3:#e4e7ec;
  --border:#dde1e8; --text:#1a1d23; --text2:#5a6170; --text3:#9aa0ad;
  --accent:#2563eb; --accent2:#1d4ed8; --green:#16a34a; --yellow:#d97706;
  --red:#dc2626; --purple:#7c3aed;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}

/* HEADER */
.hdr{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,0.97);border-bottom:1px solid var(--border);backdrop-filter:blur(10px);display:flex;align-items:center;gap:12px;padding:0 20px;height:56px;}
.logo{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;color:var(--accent);}
.hstats{display:flex;gap:12px;margin-left:auto;}
.hs{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);}
.hs b{font-family:'JetBrains Mono',monospace;color:var(--text);font-weight:600;}

/* TABS */
.tabs{position:fixed;top:56px;left:0;right:0;z-index:99;background:var(--surface);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none;padding:0 4px;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:9px 14px;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;font-family:'Noto Sans JP',sans-serif;white-space:nowrap;transition:color 0.15s;}
.tab:hover{color:var(--text2);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* LAYOUT */
.main{display:flex;padding-top:96px;height:100vh;}

/* SIDEBAR */
.sidebar{width:240px;min-width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:calc(100vh - 96px);overflow:hidden;}
.sb-sec{padding:10px 16px 4px;font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;}
.filter-area{padding:8px 16px;border-top:1px solid var(--border);flex:1;overflow-y:auto;}
.fg{margin-bottom:12px;}
.fl{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;}
.chips{display:flex;flex-wrap:wrap;gap:4px;}
.chip{padding:3px 8px;border-radius:4px;font-size:11px;cursor:pointer;border:1px solid var(--border);color:var(--text2);transition:all .15s;background:transparent;}
.chip:hover{border-color:var(--accent);color:var(--accent);}
.chip.on{background:var(--accent2);border-color:var(--accent2);color:#fff;}

/* CONTENT */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.toolbar{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.sbox{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 12px;flex:1;max-width:400px;}
.sbox input{background:none;border:none;outline:none;color:var(--text);font-size:13px;width:100%;font-family:'Noto Sans JP',sans-serif;}
.sbox input::placeholder{color:var(--text3);}
.btn{padding:7px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-size:12px;display:flex;align-items:center;gap:6px;transition:all .15s;font-family:'Noto Sans JP',sans-serif;white-space:nowrap;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn.pri{background:var(--accent2);border-color:var(--accent2);color:#fff;}
.btn.pri:hover{background:var(--accent);}
.rcount{font-size:12px;color:var(--text2);margin-left:auto;white-space:nowrap;}

/* FACILITY LIST */
.flist{flex:1;overflow-y:auto;padding:10px 16px;}
.fcard{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:7px;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:12px;}
.fcard:hover{border-color:var(--accent);background:var(--surface2);}
.fcard.sel{border-color:var(--accent);background:#eff6ff;}
.rbadge{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;padding:2px 6px;border-radius:4px;min-width:34px;text-align:center;flex-shrink:0;margin-top:1px;}
.rCA{background:#dcfce7;color:#15803d;border:1px solid #bbf7d0;}
.rCB{background:#dbeafe;color:#1d4ed8;border:1px solid #bfdbfe;}
.rHA{background:#ede9fe;color:#6d28d9;border:1px solid #ddd6fe;}
.rHB{background:#ffedd5;color:#c2410c;border:1px solid #fed7aa;}
.r検診C{background:#fef9c3;color:#854d0e;border:1px solid #fef08a;}
.rnone{background:var(--surface2);color:var(--text3);border:1px solid var(--border);}
.cmain{flex:1;min-width:0;}
.cname{font-size:14px;font-weight:500;margin-bottom:3px;}
.cmeta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.ctag{font-size:11px;color:var(--text2);}
.mtag{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:500;}
.mFuji{background:#fee2e2;color:#b91c1c;}
.mOri{background:#dcfce7;color:#15803d;}
.mOther{background:var(--surface2);color:var(--text3);}
.cmemo{font-size:12px;color:var(--text2);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:500px;}
.grp-hdr{padding:10px 4px 4px;font-size:12px;font-weight:700;color:var(--accent);border-bottom:2px solid var(--accent);margin-bottom:6px;margin-top:16px;}
.grp-hdr:first-child{margin-top:0;}
.area-hdr{padding:5px 4px 2px;font-size:11px;font-weight:600;color:var(--text2);}

/* DETAIL */
.dpanel{width:400px;min-width:400px;border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;height:calc(100vh - 96px);overflow:hidden;transition:width .2s,min-width .2s;}
.dpanel.hide{width:0;min-width:0;overflow:hidden;}
.dhdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;}
.dname{font-size:15px;font-weight:600;margin-bottom:5px;}
.dtags{display:flex;gap:6px;flex-wrap:wrap;}
.xbtn{background:none;border:none;cursor:pointer;color:var(--text2);font-size:18px;padding:2px;}
.xbtn:hover{color:var(--text);}
.dbody{flex:1;overflow-y:auto;padding:14px 18px;}
.dsec{margin-bottom:18px;}
.dsec-t{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.iitem label{display:block;font-size:11px;color:var(--text3);margin-bottom:3px;}
.iitem input,.iitem select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:5px 8px;color:var(--text);font-size:13px;font-family:'Noto Sans JP',sans-serif;outline:none;}
.iitem input:focus,.iitem select:focus{border-color:var(--accent);}
.mtarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:9px;color:var(--text);font-size:13px;font-family:'Noto Sans JP',sans-serif;outline:none;resize:vertical;min-height:70px;line-height:1.6;}
.mtarea:focus{border-color:var(--accent);}
.vlog{display:flex;flex-direction:column;gap:7px;}
.ventry{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:9px 11px;position:relative;}
.vdate{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:3px;}
.vcont{font-size:13px;color:var(--text);line-height:1.6;}
.vdel{position:absolute;top:6px;right:8px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;}
.vdel:hover{color:var(--red);}
.vsec{padding:12px 18px;border-top:1px solid var(--border);background:var(--bg);}
.vbtn{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;font-family:'Noto Sans JP',sans-serif;}
.vbtn:hover{border-color:var(--accent);color:var(--accent);}
.vbtn.rec{background:rgba(220,38,38,.08);border-color:var(--red);color:var(--red);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.vprev{margin-top:9px;padding:9px;background:var(--surface);border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--text2);display:none;line-height:1.5;}
.vprev.show{display:block;}
.vactions{display:flex;gap:8px;margin-top:8px;}
.vactions .btn{flex:1;justify-content:center;}

/* 日報タブ */
.daily-wrap{flex:1;overflow-y:auto;padding:12px 16px;display:none;}
.daily-wrap.show{display:block;}
.dnav{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.dnav-btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 14px;cursor:pointer;font-size:16px;}
.dnav-btn:hover{border-color:var(--accent);}
.dnav-label{flex:1;text-align:center;font-size:15px;font-weight:600;}
.dsum-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:12px;}
.dsum-box label{display:block;font-size:11px;color:var(--text3);text-transform:uppercase;margin-bottom:6px;}
.dsum-box textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px;font-size:13px;font-family:'Noto Sans JP',sans-serif;outline:none;resize:vertical;min-height:70px;line-height:1.6;color:var(--text);}
.dsum-box textarea:focus{border-color:var(--accent);}
.dvisit-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:11px 13px;margin-bottom:8px;position:relative;}
.dv-name{font-size:13px;font-weight:600;color:var(--accent);margin-bottom:3px;}
.dv-body{font-size:13px;color:var(--text);line-height:1.6;}
.ddel{position:absolute;top:8px;right:10px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;}
.ddel:hover{color:var(--red);}
.dadd-row{display:flex;flex-direction:column;gap:6px;margin-top:8px;}
.dadd-row button{padding:9px;border-radius:8px;font-size:13px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all .15s;}
.dbtn-manual{border:1px dashed var(--border);background:transparent;color:var(--text3);}
.dbtn-manual:hover{border-color:var(--accent);color:var(--accent);}
.dbtn-voice{border:1px solid var(--border);background:var(--surface2);color:var(--text2);display:flex;align-items:center;justify-content:center;gap:8px;}
.dbtn-voice:hover{border-color:var(--accent);color:var(--accent);}
.dbtn-voice.rec{background:rgba(220,38,38,.08);border-color:var(--red);color:var(--red);animation:pulse 1s infinite;}

/* 日報履歴一覧 */
.history-sec{margin-top:20px;border-top:2px solid var(--border);padding-top:14px;}
.history-sec-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;}
.hist-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:11px 14px;margin-bottom:8px;cursor:pointer;transition:border-color .15s;}
.hist-card:hover{border-color:var(--accent);}
.hist-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.hist-date{font-size:13px;font-weight:600;color:var(--text);}
.hist-cnt{font-size:12px;color:var(--accent);font-weight:600;}
.hist-summary{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:4px;}
.hist-detail{display:none;margin-top:6px;border-top:1px solid var(--border);padding-top:6px;}
.hist-detail.open{display:block;}
.hist-vrow{font-size:12px;padding:4px 0;border-bottom:1px solid var(--border);line-height:1.5;}
.hist-vrow:last-child{border-bottom:none;}
.hist-fname{font-weight:600;color:var(--text);}

/* 報告タブ */
.report-wrap{flex:1;overflow-y:auto;padding:12px 16px;display:none;}
.report-wrap.show{display:block;}
.rep-form{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:14px;}
.rep-form-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px;}
.rep-field{margin-bottom:10px;}
.rep-field label{display:block;font-size:11px;color:var(--text3);text-transform:uppercase;margin-bottom:4px;}
.rep-field input,.rep-field textarea,.rep-field select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:13px;color:var(--text);font-family:'Noto Sans JP',sans-serif;outline:none;}
.rep-field input:focus,.rep-field textarea:focus,.rep-field select:focus{border-color:var(--accent);}
.rep-field textarea{resize:vertical;min-height:80px;line-height:1.6;}
.rep-sug{background:var(--surface);border:1px solid var(--border);border-radius:4px;max-height:130px;overflow-y:auto;display:none;margin-top:2px;}
.rep-sug-item{padding:7px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border);}
.rep-sug-item:hover{background:var(--surface2);}
.rep-history{margin-top:16px;}
.rep-history-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;border-top:2px solid var(--border);padding-top:14px;}
.rep-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:11px 14px;margin-bottom:8px;position:relative;}
.rep-card-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
.rep-card-date{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;}
.rep-card-name{font-size:13px;font-weight:600;color:var(--accent);}
.rep-card-body{font-size:13px;color:var(--text);line-height:1.6;}
.rep-del{position:absolute;top:8px;right:10px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;}
.rep-del:hover{color:var(--red);}
.copy-btn{position:absolute;top:8px;right:32px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:2px;}
.copy-btn:hover{color:var(--accent);}
.copy-all-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:9px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-size:12px;font-family:'Noto Sans JP',sans-serif;margin-bottom:10px;transition:all .15s;}
.copy-all-btn:hover{border-color:var(--accent);color:var(--accent);}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.overlay.show{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;width:460px;max-width:92vw;max-height:88vh;overflow-y:auto;}
.modal h3{font-size:15px;margin-bottom:14px;}
.modal-actions{display:flex;gap:8px;margin-top:12px;justify-content:flex-end;}

/* EMPTY / TOAST */
.empty{text-align:center;padding:50px 20px;color:var(--text3);}
.empty-icon{font-size:36px;margin-bottom:10px;}
.toast{position:fixed;bottom:20px;right:20px;z-index:300;background:var(--surface3);border:1px solid var(--border);border-radius:8px;padding:9px 14px;font-size:13px;transform:translateY(80px);transition:transform .3s;}
.toast.show{transform:translateY(0);}
.toast.ok{border-color:var(--green);}
.toast.err{border-color:var(--red);}

/* KPI VIEW */
.kpi-wrap{flex:1;overflow:hidden;display:none;flex-direction:column;}
.kpi-wrap.show{display:flex;}
.kpi-card-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
@media(max-width:768px){.kpi-card-row{grid-template-columns:1fr;}}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;border-left:3px solid;}
.kpi-card.kc1{border-left-color:#dc2626;} .kpi-card.kc2{border-left-color:#2563eb;} .kpi-card.kc3{border-left-color:#d97706;}
.kpi-card-title{font-size:12px;font-weight:600;margin-bottom:4px;}
.kpi-card-target{font-size:10px;color:var(--text3);margin-bottom:8px;}
.kpi-card-num{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:600;}
.kpi-card-num.kc1{color:#dc2626;} .kpi-card-num.kc2{color:#2563eb;} .kpi-card-num.kc3{color:#d97706;}
.kpi-bar{height:4px;background:var(--surface2);border-radius:2px;margin-top:6px;overflow:hidden;}
.kpi-bar-fill{height:100%;border-radius:2px;transition:width .5s ease;}
.kpi-bar-fill.kc1{background:#dc2626;} .kpi-bar-fill.kc2{background:#2563eb;} .kpi-bar-fill.kc3{background:#d97706;}
.kpi-week-bars{display:flex;gap:2px;align-items:flex-end;height:28px;margin-top:6px;}
.kpi-week-bar{flex:1;border-radius:2px 2px 0 0;min-height:2px;}
.kpi-log-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px;position:relative;}
.kpi-log-cat{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;display:inline-block;}
.kpi-log-cat.kc1{background:#fee2e2;color:#dc2626;} .kpi-log-cat.kc2{background:#dbeafe;color:#1d4ed8;} .kpi-log-cat.kc3{background:#fef3c7;color:#d97706;}
.kpi-log-fac{font-size:13px;font-weight:500;margin-top:4px;}
.kpi-log-type{font-size:11px;color:var(--text2);margin-top:2px;}
.kpi-log-memo{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.5;}
.kpi-log-date{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;}
.kpi-log-del{position:absolute;top:8px;right:10px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;}
.kpi-log-del:hover{color:var(--red);}
.kpi-actions{display:flex;gap:8px;margin-bottom:12px;}

/* scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* MOBILE */
@media(max-width:768px){
  .hdr{padding:0 14px;}
  .hdr-bk{display:none!important;}
  .hstats{display:none;}
  .main{flex-direction:column;padding-bottom:calc(60px + env(safe-area-inset-bottom));}
  .sidebar{position:fixed;left:-260px;top:96px;bottom:calc(60px + env(safe-area-inset-bottom));width:260px;min-width:260px;z-index:90;transition:left .25s;height:auto;}
  .sidebar.open{left:0;box-shadow:4px 0 20px rgba(0,0,0,.12);}
  .sb-overlay{position:fixed;inset:0;top:96px;bottom:calc(60px + env(safe-area-inset-bottom));background:rgba(0,0,0,.25);z-index:89;display:none;}
  .sb-overlay.show{display:block;}
  .content{width:100%;}
  .dpanel{position:fixed;inset:0;top:96px;bottom:calc(60px + env(safe-area-inset-bottom));width:100%!important;min-width:0!important;z-index:80;transform:translateX(100%);transition:transform .25s;}
  .dpanel:not(.hide){transform:translateX(0);}
  .dpanel.hide{transform:translateX(100%)!important;width:100%!important;}
  .daily-wrap,.report-wrap{width:100%;}
  .sbox{max-width:none;}
  .rcount{display:none;}
  .bnav{display:flex!important;position:fixed;bottom:0;left:0;right:0;height:calc(60px + env(safe-area-inset-bottom));background:var(--surface);border-top:1px solid var(--border);z-index:100;align-items:flex-start;padding-top:8px;}
  .bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;color:var(--text3);font-size:10px;border:none;background:none;font-family:'Noto Sans JP',sans-serif;}
  .bnav-item.on{color:var(--accent);}
  .bnav-item span{font-size:20px;line-height:1;}
}
.bnav{display:none;}
.sb-overlay{display:none;}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">MedSales</div>
  <div class="hstats">
    <div class="hs">施設数 <b id="hTotal">—</b></div>
    <div class="hs">訪問済 <b id="hVisited">—</b></div>
    <div class="hs">CA <b id="hCA">—</b></div>
  </div>
  <button class="btn hdr-bk" onclick="exportBackup()" style="margin-left:auto" title="全データをバックアップ">💾 バックアップ</button>
  <button class="btn hdr-bk" onclick="document.getElementById('importFile').click()" title="バックアップから復元">📂 復元</button>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importBackup(this)">
  <button class="btn pri" onclick="openAddModal()">＋ 施設追加</button>

<script>
// ===== DATA =====
const INITIAL_DATA = [];

const INITIAL_REPORT_DATA = [];
const INITIAL_DAILY_DATA = {};
let facilities = [];
let visitLogs = {};   // { id: [{date,content},...] }
let dailyData = {};   // { "YYYY/MM/DD": {summary, visits:[{name,content},...]} }
let reportData = [];  // [{id,date,facilityName,content},...] 報告タブ用
let nextId = 3000;
let nextRepId = 1;
let selId = null;
let activeFilters = {};
let activePref = '全県';
let activeView = 'list';
let dCurrentDate = todayStr();

// 音声
let voiceRec = null, isVoiceRec = false, voiceText = '';
let dVoiceRec = null, isDVoiceRec = false, dVoiceText = '';

// ===== UTILS =====
function todayStr() {
  const d = new Date();
  return d.getFullYear() + '/' + pad(d.getMonth()+1) + '/' + pad(d.getDate());
}
function pad(n) { return String(n).padStart(2,'0'); }
function dateInputVal() {
  const d = new Date();
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
}
function inputToSlash(s) { return s ? s.replace(/-/g, '/') : todayStr(); }

// ===== STORAGE =====
function loadAll() {
  const sf = localStorage.getItem('ms_facilities');
  const sl = localStorage.getItem('ms_visitlogs');
  const sd = localStorage.getItem('ms_daily');
  const sr = localStorage.getItem('ms_report');
  facilities = sf ? JSON.parse(sf) : JSON.parse(JSON.stringify(INITIAL_DATA));
  visitLogs  = sl ? JSON.parse(sl) : {};
  dailyData  = sd ? JSON.parse(sd) : JSON.parse(JSON.stringify(INITIAL_DAILY_DATA));
  reportData = sr ? JSON.parse(sr) : JSON.parse(JSON.stringify(INITIAL_REPORT_DATA));
  if (!sf) localStorage.setItem('ms_facilities', JSON.stringify(facilities));
  if (!sd) localStorage.setItem('ms_daily', JSON.stringify(dailyData));
  if (!sr) localStorage.setItem('ms_report', JSON.stringify(reportData));
  nextId = Math.max(...facilities.map(f=>f.id), 2999) + 1;
  nextRepId = reportData.length ? Math.max(...reportData.map(r=>r.id||0)) + 1 : 1;
}
function saveF()  { localStorage.setItem('ms_facilities', JSON.stringify(facilities)); }
function saveL()  { localStorage.setItem('ms_visitlogs', JSON.stringify(visitLogs)); }
function saveD()  { localStorage.setItem('ms_daily', JSON.stringify(dailyData)); }
function saveR()  { localStorage.setItem('ms_report', JSON.stringify(reportData)); }

// ===== TABS =====
function setTab(view, pref, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  activeView = view;
  activePref = pref || '全県';
  document.getElementById('listView').style.display   = view==='list'   ? '' : 'none';
  document.getElementById('dailyView').classList.toggle('show', view==='daily');
  document.getElementById('reportView').classList.toggle('show', view==='report');
  document.getElementById('kpiView').classList.toggle('show', view==='kpi');
  document.getElementById('detailPanel').classList.add('hide');
  document.querySelectorAll('.bnav-item').forEach(b => b.classList.remove('on'));
  const bn = document.getElementById('bn-'+view);
  if (bn) bn.classList.add('on');
  if (view==='list') { activeFilters={}; document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on')); render(); }
  if (view==='daily') renderDailyView();
  if (view==='report') renderReportView();
  if (view==='kpi') renderKpi();
  closeSidebar();
}

function bnav(view) {
  let target = null;
  if (view==='list') {
    target = document.querySelector('#tabBar .tab');
  } else {
    target = document.querySelector('#tabBar .tab[data-view="'+view+'"]');
  }
  if (target) setTab(view, view==='list'?'全県':'', target);
}

// ===== FILTERS =====
const RANK_ORDER = {CA:0,CB:1,HA:2,HB:3,'検診C':4,'':5};
function getPrefectures() {
  const prefs = [...new Set(facilities.map(f=>f.prefecture).filter(Boolean))];
  prefs.sort((a,b)=>a.localeCompare(b,'ja'));
  return prefs;
}

function prefSuffix(name) {
  if (name === '東京') return '都';
  if (name === '北海道') return '';
  if (name === '大阪' || name === '京都') return '府';
  return '県';
}

function buildTabs() {
  const prefs = getPrefectures();
  const bar = document.getElementById('tabBar');
  let html = '<button class="tab'+(activeView==='list'&&activePref==='全県'?' active':'')+'" onclick="setTab(\'list\',\'全県\',this)">全県</button>';
  prefs.forEach(p => {
    const suffix = prefSuffix(p);
    html += '<button class="tab'+(activeView==='list'&&activePref===p?' active':'')+'" onclick="setTab(\'list\',\''+p+'\',this)">'+p+suffix+'</button>';
  });
  html += '<button class="tab'+(activeView==='daily'?' active':'')+'" data-view="daily" onclick="setTab(\'daily\',\'\',this)">📅 日報</button>';
  html += '<button class="tab'+(activeView==='report'?' active':'')+'" data-view="report" onclick="setTab(\'report\',\'\',this)">📋 報告</button>';
  html += '<button class="tab'+(activeView==='kpi'?' active':'')+'" data-view="kpi" onclick="setTab(\'kpi\',\'\',this)">📊 KPI</button>';
  bar.innerHTML = html;
}

function getPrefOrder() {
  const prefs = getPrefectures();
  const order = {};
  prefs.forEach((p,i) => order[p] = i);
  return order;
}
const PREF_ORDER_FN = getPrefOrder;

function buildChips() {
  const ranks = ['CA','CB','HA','HB','検診C'];
  document.getElementById('rankChips').innerHTML = ranks.map(r =>
    '<span class="chip" onclick="toggleF(\'rank\',\''+r+'\',this)">'+r+'</span>'
  ).join('');
  const models = [...new Set(facilities.map(f=>f.model).filter(Boolean))];
  document.getElementById('modelChips').innerHTML = models.map(m =>
    '<span class="chip" onclick="toggleF(\'model\',\''+m+'\',this)">'+m+'</span>'
  ).join('');
}

function toggleF(key, val, el) {
  if (activeFilters[key] === val) { delete activeFilters[key]; el.classList.remove('on'); }
  else {
    document.querySelectorAll('.chip[onclick*="toggleF(\''+key+'\'"]').forEach(c=>c.classList.remove('on'));
    activeFilters[key] = val; el.classList.add('on');
  }
  render();
}

function getFiltered() {
  const q = (document.getElementById('searchInput').value||'').toLowerCase();
  return facilities.filter(f => {
    if (activePref !== '全県' && f.prefecture !== activePref) return false;
    if (activeFilters.rank && f.rank !== activeFilters.rank) return false;
    if (activeFilters.model && f.model !== activeFilters.model) return false;
    if (activeFilters.hasMemo === '有' && !f.memo) return false;
    if (activeFilters.hasMemo === '無' && f.memo) return false;
    if (q) {
      const s = [f.name,f.area,f.memo,f.prefecture].join(' ').toLowerCase();
      if (!s.includes(q)) return false;
    }
    return true;
  });
}

function getSorted(list) {
  const s = document.getElementById('sortSel').value;
  const a = [...list];
  if (s==='pref_area') { const PO=getPrefOrder(); a.sort((x,y)=>{const d=(PO[x.prefecture]||99)-(PO[y.prefecture]||99);return d||((x.area||'').localeCompare(y.area||'','ja'));});}
  else if (s==='pref_rank') { const PO=getPrefOrder(); a.sort((x,y)=>{const d=(PO[x.prefecture]||99)-(PO[y.prefecture]||99);return d||(RANK_ORDER[x.rank]||9)-(RANK_ORDER[y.rank]||9);});}
  else if (s==='rank') a.sort((x,y)=>(RANK_ORDER[x.rank]||9)-(RANK_ORDER[y.rank]||9));
  else if (s==='name') a.sort((x,y)=>x.name.localeCompare(y.name,'ja'));
  return a;
}

// ===== RENDER LIST =====
function render() {
  const list = getSorted(getFiltered());
  document.getElementById('rcount').textContent = list.length+' / '+facilities.length+' 件';
  const ct = document.getElementById('facilityList');
  if (!list.length) { ct.innerHTML='<div class="empty"><div class="empty-icon">🔍</div>該当施設なし</div>'; updateStats(); return; }
  const sv = document.getElementById('sortSel').value;
  const grp = sv==='pref_area'||sv==='pref_rank';
  let lastP=null, lastA=null;
  ct.innerHTML = list.map(f => {
    let h = '';
    if (grp && f.prefecture!==lastP) {
      if (lastP!==null) h += '';
      lastP=f.prefecture; lastA=null;
      h += '<div class="grp-hdr">'+f.prefecture+prefSuffix(f.prefecture)+'</div>';
    }
    if (sv==='pref_area' && f.area && f.area!==lastA) {
      lastA=f.area;
      h += '<div class="area-hdr">📍 '+f.area+'</div>';
    }
    return h + renderCard(f);
  }).join('');
  updateStats();
}

function renderCard(f) {
  const rc = f.rank ? ('r'+f.rank) : 'rnone';
  const mc = f.model==='Fuji' ? 'mFuji' : f.model==='オリ' ? 'mOri' : 'mOther';
  const lc = (visitLogs[f.id]||[]).length;
  return '<div class="fcard'+(selId===f.id?' sel':'')+'" onclick="selectF('+f.id+')">' +
    '<span class="rbadge '+rc+'">'+(f.rank||'—')+'</span>' +
    '<div class="cmain">' +
    '<div class="cname">'+f.name+'</div>' +
    '<div class="cmeta">' +
    '<span class="ctag">'+(f.prefecture||'—')+(f.area?' / '+f.area:'')+'</span>' +
    (f.model?'<span class="mtag '+mc+'">'+f.model+'</span>':'') +
    (f.holiday?'<span class="ctag">休:'+f.holiday+(f.holiday_ampm?' '+f.holiday_ampm:'')+'</span>':'') +
    (f.pm_end?'<span class="ctag">PM終:'+f.pm_end+'</span>':'') +
    (lc?'<span class="ctag" style="color:var(--accent)">📋'+lc+'件</span>':'') +
    '</div>' +
    (f.memo?'<div class="cmemo">'+f.memo+'</div>':'') +
    '</div></div>';
}

function dChangeDate(delta) {
  if (delta===0) { dCurrentDate=todayStr(); }
  else {
    const p=dCurrentDate.split('/');
    const d=new Date(+p[0],+p[1]-1,+p[2]);
    d.setDate(d.getDate()+delta);
    dCurrentDate=d.getFullYear()+'/'+pad(d.getMonth()+1)+'/'+pad(d.getDate());
  }
  renderDailyView();
}

function renderDailyView() {
  const p=dCurrentDate.split('/');
  const d=new Date(+p[0],+p[1]-1,+p[2]);
  const dn=['日','月','火','水','木','金','土'];
  document.getElementById('dDateLabel').textContent=dCurrentDate+'（'+dn[d.getDay()]+'）';
  const day=dailyData[dCurrentDate]||{summary:'',visits:[]};
  document.getElementById('dSummary').value=day.summary||'';
  const visits=day.visits||[];
  const ct=document.getElementById('dVisitList');
  if (!visits.length) { ct.innerHTML='<div style="font-size:12px;color:var(--text3);padding:6px 0">この日の訪問記録はありません</div>'; }
  else { ct.innerHTML=
    '<button class="copy-all-btn" onclick="copyDayAll()">📋 この日の訪問をまとめてコピー</button>' +
    visits.map((v,i)=>
    '<div class="dvisit-card">' +
    '<button class="ddel" onclick="delDayVisit('+i+')">✕</button>' +
    '<button class="copy-btn" onclick="copyDayVisit('+i+')" title="コピー" style="right:32px">📋</button>' +
    '<div class="dv-name">🏥 '+(v.name||'施設不明')+'</div>' +
    '<div class="dv-body">'+v.content+'</div>' +
    '</div>'
  ).join(''); }
  renderHistory();
}

function renderHistory() {
  const all = Object.keys(dailyData)
    .filter(d => {
      const day = dailyData[d];
      return (day.visits&&day.visits.length) || day.summary;
    })
    .sort((a,b)=>b>a?1:-1);
  const ct = document.getElementById('historyList');
  if (!all.length) { ct.innerHTML='<div style="font-size:12px;color:var(--text3)">記録がまだありません</div>'; return; }
  const dn=['日','月','火','水','木','金','土'];
  ct.innerHTML = all.map((d,idx) => {
    const day=dailyData[d];
    const visits=day.visits||[];
    const p=d.split('/');
    const dt=new Date(+p[0],+p[1]-1,+p[2]);
    const label=d+'（'+dn[dt.getDay()]+'）';
    const vrows=visits.map(v=>
      '<div class="hist-vrow"><span class="hist-fname">'+(v.name||'施設不明')+'</span>　'+v.content+'</div>'
    ).join('');
    return '<div class="hist-card" onclick="toggleHist('+idx+')">' +
      '<div class="hist-hdr">' +
      '<div class="hist-date">'+label+'</div>' +
      '<div class="hist-cnt">訪問 '+visits.length+'件</div>' +
      '</div>' +
      (day.summary?'<div class="hist-summary">'+day.summary+'</div>':'') +
      '<div class="hist-detail" id="hist'+idx+'">'+vrows+'</div>' +
      '</div>';
  }).join('');
}

  const el=document.getElementById('hist'+idx);
  if (el) el.classList.toggle('open');
}

function copyDayAll() {

  // KPIデータも収集
  const kpiData = {};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k.startsWith('kpi_')) kpiData[k]=JSON.parse(localStorage.getItem(k));
  }
  const data = {
    version: 2,
    exportedAt: new Date().toISOString(),
    facilities: facilities,
    visitLogs: visitLogs,
    dailyData: dailyData,
    reportData: reportData,
    nextId: nextId,
    nextRepId: nextRepId,
    kpiData: kpiData
  };
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const d = new Date();
  a.download = 'medsales_backup_' + d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate()) + '.json';
  a.click();
  showToast('バックアップを保存しました（KPI含む）', 'ok');
}

function importBackup(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.facilities || !Array.isArray(data.facilities)) {
        showToast('ファイルが正しくありません', 'err'); return;
      }
      const count = data.facilities.length;
      const hasKpi = data.kpiData && Object.keys(data.kpiData).length > 0;
      if (!confirm('復元すると現在のデータが上書きされます。\n施設数: ' + count + '件' + (hasKpi ? '\nKPIデータ: あり' : '') + '\nエクスポート日時: ' + (data.exportedAt||'不明') + '\n\n続けますか？')) {
        input.value = ''; return;
      }
      facilities  = data.facilities  || [];
      visitLogs   = data.visitLogs   || {};
      dailyData   = data.dailyData   || {};
      reportData  = data.reportData  || [];
      nextId      = data.nextId      || (Math.max(...facilities.map(f=>f.id), 2999) + 1);
      nextRepId   = data.nextRepId   || (reportData.length ? Math.max(...reportData.map(r=>r.id||0)) + 1 : 1);
      saveF(); saveL(); saveD(); saveR();
      // KPIデータも復元
      if (data.kpiData) {
        // 既存のKPIデータをクリア
        const kpiKeys=[];
        for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith('kpi_'))kpiKeys.push(k);}
        kpiKeys.forEach(k=>localStorage.removeItem(k));
        // 新しいKPIデータを書き込み
        for(const[k,v] of Object.entries(data.kpiData)){
          localStorage.setItem(k, JSON.stringify(v));
        }
      }
      buildChips();
      buildTabs();
      render();
      showToast('復元しました（施設 ' + count + '件' + (hasKpi ? '、KPIデータ含む' : '') + '）', 'ok');
    } catch(err) {
      showToast('読み込みに失敗しました', 'err');
    }
    input.value = '';
  };
  reader.readAsText(file, 'utf-8');
}

// ===== KPI TRACKER =====
let kpiMonth = new Date().toISOString().slice(0,7);
let kpiSelectedCat = null;
const KPI_CATS = {
  '案件創出': {cls:'kc1',kpi:'週5件の新規案件創出活動',perWeek:5},
  '案件進展': {cls:'kc2',kpi:'週2件の案件フェーズの進展',perWeek:2},
  '予算申請': {cls:'kc3',kpi:'8月までに予算申請可能施設を3件',total:3}
};

function kpiKey(m){return 'kpi_entries_'+m;}
function kpiReviewKey(m){return 'kpi_review_'+m;}
function kpiGetEntries(m){try{return JSON.parse(localStorage.getItem(kpiKey(m)))||[];}catch{return [];}}
function kpiSetEntries(m,e){localStorage.setItem(kpiKey(m),JSON.stringify(e));}
function kpiGetReview(m){try{return JSON.parse(localStorage.getItem(kpiReviewKey(m)))||{};}catch{return {};}}
function kpiSetReview(m,d){localStorage.setItem(kpiReviewKey(m),JSON.stringify(d));}

function kpiWeeksInMonth(m){const[y,mo]=m.split('-').map(Number);return Math.ceil(new Date(y,mo,0).getDate()/7);}
function kpiWeeklyData(m,cat){
  const[y,mo]=m.split('-').map(Number);
  const entries=kpiGetEntries(m).filter(e=>e.category===cat);
  const dim=new Date(y,mo,0).getDate();
  const weeks=[];
  for(let d=1;d<=dim;d+=7){
    const s=d,end=Math.min(d+6,dim);
    const c=entries.filter(e=>{const day=parseInt(e.date.split('-')[2]);return day>=s&&day<=end;}).length;
    weeks.push({s,end,count:c});
  }
  return weeks;
}

function kpiChangeMonth(d){
  const dt=new Date(kpiMonth+'-01');dt.setMonth(dt.getMonth()+d);
  kpiMonth=dt.toISOString().slice(0,7);
  renderKpi();
}

function renderKpi(){
  const[y,m]=kpiMonth.split('-');
  document.getElementById('kpiMonthLabel').textContent=y+'/'+m;
  const entries=kpiGetEntries(kpiMonth);
  const weeks=kpiWeeksInMonth(kpiMonth);
  let html='<div class="kpi-card-row">';
  for(const[cat,cfg] of Object.entries(KPI_CATS)){
    const count=entries.filter(e=>e.category===cat).length;
    let target,pct;
    if(cfg.perWeek){target=cfg.perWeek*weeks;pct=target>0?Math.min(Math.round(count/target*100),100):0;}
    else{target=cfg.total;pct=Math.min(Math.round(count/target*100),100);}
    const wd=kpiWeeklyData(kpiMonth,cat);
    const mx=Math.max(...wd.map(w=>w.count),1);
    const clr=cfg.cls==='kc1'?'#dc2626':cfg.cls==='kc2'?'#2563eb':'#d97706';
    let bars='<div class="kpi-week-bars">';
    wd.forEach(w=>{const h=(w.count/mx)*24+4;bars+=`<div class="kpi-week-bar" style="height:${h}px;background:${clr}"></div>`;});
    bars+='</div>';
    const pctColor=pct>=100?'var(--green)':pct>=70?'var(--yellow)':'var(--red)';
    const weekAvg=weeks>0?(count/weeks).toFixed(1):'0';
    let targetLabel=cfg.perWeek?`目標:週${cfg.perWeek}件(月${target}件) 週平均${weekAvg}件`:`目標:${cfg.total}件 残り${Math.max(cfg.total-count,0)}件`;
    html+=`<div class="kpi-card ${cfg.cls}">
      <div class="kpi-card-title">${cat}</div>
      <div class="kpi-card-target">${targetLabel}</div>
      <div style="display:flex;align-items:baseline;gap:4px;">
        <span class="kpi-card-num ${cfg.cls}">${count}</span><span style="font-size:12px;color:var(--text2)">件</span>
        <span style="margin-left:auto;font-size:11px;color:${pctColor};font-weight:600">${pct}%</span>
      </div>
      <div class="kpi-bar"><div class="kpi-bar-fill ${cfg.cls}" style="width:${pct}%"></div></div>
      ${bars}
    </div>`;
  }
  html+='</div>';
  html+='<div class="kpi-actions"><button class="btn" onclick="openKpiSummary()">📊 サマリー・振り返り</button></div>';
  // Log entries
  const sorted=[...entries].sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id);
  if(!sorted.length){html+='<div class="empty"><div class="empty-icon">🎯</div>まだKPI活動記録がありません</div>';}
  else{
    let lastD='';
    sorted.forEach(e=>{
      if(e.date!==lastD){
        const dd=new Date(e.date+'T00:00:00');const dow=['日','月','火','水','木','金','土'][dd.getDay()];
        html+=`<div style="font-size:11px;color:var(--text3);margin-top:12px;margin-bottom:4px;">${e.date} (${dow})</div>`;
        lastD=e.date;
      }
      const cfg=KPI_CATS[e.category]||{cls:'kc1'};
      html+=`<div class="kpi-log-item">
        <button class="kpi-log-del" onclick="kpiDelEntry(${e.id})">✕</button>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
          <span class="kpi-log-cat ${cfg.cls}">${e.category}</span>
          <span class="kpi-log-date">${e.date}</span>
        </div>
        <div class="kpi-log-fac">${e.facility}</div>
        ${e.memo?`<div class="kpi-log-memo">${e.memo}</div>`:''}
      </div>`;
    });
  }
  document.getElementById('kpiContent').innerHTML=html;
}

function openKpiModal(){
  kpiSelectedCat=null;
  document.querySelectorAll('#kpiCatChips .chip').forEach(c=>c.classList.remove('on'));
  document.getElementById('kpi-date').value=dateInputVal();
  document.getElementById('kpi-facility').value='';
  document.getElementById('kpi-memo').value='';
  // reset new facility area
  document.getElementById('kpiNewFacArea').style.display='none';
  ['kpi-new-pref','kpi-new-area'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('kpi-new-model').value='';
  document.getElementById('kpi-new-rank').value='';
  // populate datalist from facilities
  document.getElementById('kpiFacDL').innerHTML=facilities.map(f=>'<option value="'+f.name+'">').join('');
  document.getElementById('kpiModal').classList.add('show');
}

function kpiSelectCat(cat,el){
  document.querySelectorAll('#kpiCatChips .chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');kpiSelectedCat=cat;
}

function saveKpiEntry(){
  if(!kpiSelectedCat){showToast('カテゴリを選択','err');return;}
  const date=document.getElementById('kpi-date').value;
  const fac=document.getElementById('kpi-facility').value.trim();
  if(!fac){showToast('施設名を入力','err');return;}
  if(!date){showToast('日付を入力','err');return;}

  // 未登録施設チェック
  const existing=facilities.find(x=>x.name===fac);
  const newFacArea=document.getElementById('kpiNewFacArea');
  if(!existing && newFacArea.style.display==='none'){
    // 初回：登録フォームを表示して確認
    newFacArea.style.display='block';
    showToast('未登録の施設です。情報を入力して再度「記録」を押してください','');
    return;
  }

  // 未登録なら施設を新規登録
  if(!existing){
    const newF={
      id:nextId++, name:fac,
      prefecture:document.getElementById('kpi-new-pref').value.trim(),
      area:document.getElementById('kpi-new-area').value.trim(),
      model:document.getElementById('kpi-new-model').value,
      rank:document.getElementById('kpi-new-rank').value,
      holiday:'',holiday_ampm:'',am_end:'',pm_end:'',
      memo:''
    };
    facilities.push(newF); saveF();
    buildChips(); buildTabs();
  }

  const month=date.slice(0,7);
  const memo=document.getElementById('kpi-memo').value.trim();
  const entries=kpiGetEntries(month);
  entries.push({id:Date.now(),category:kpiSelectedCat,date,facility:fac,memo});
  kpiSetEntries(month,entries);

  // --- 報告・日報・施設ログにも自動連携 ---
  const dateSlash=inputToSlash(date);
  const content='[KPI:'+kpiSelectedCat+'] '+(memo||fac);

  // 報告データに追加
  reportData.push({id:nextRepId++, date:dateSlash, facilityName:fac, content});
  saveR();

  // 日報データに追加
  if(!dailyData[dateSlash]) dailyData[dateSlash]={summary:'',visits:[]};
  dailyData[dateSlash].visits.push({name:fac, content});
  saveD();

  // 施設の訪問ログに追加
  const f=facilities.find(x=>x.name===fac);
  if(f){
    if(!visitLogs[f.id]) visitLogs[f.id]=[];
    visitLogs[f.id].push({date:dateSlash, content});
    saveL();
  }

  if(month===kpiMonth)renderKpi();
  closeModal('kpiModal');
  showToast(existing?'KPI活動を記録しました（報告・日報にも反映）':'KPI活動を記録し、施設も新規登録しました','ok');
}

function kpiDelEntry(id){
  if(!confirm('この記録を削除しますか？'))return;
  const entries=kpiGetEntries(kpiMonth).filter(e=>e.id!==id);
  kpiSetEntries(kpiMonth,entries);renderKpi();showToast('削除しました');
}

function openKpiSummary(){
  const entries=kpiGetEntries(kpiMonth);
  const weeks=kpiWeeksInMonth(kpiMonth);
  let tbl='<table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:12px;">';
  tbl+='<tr style="background:var(--surface2)"><th style="padding:6px;text-align:left;border:1px solid var(--border)">アクションプラン</th><th style="padding:6px;border:1px solid var(--border)">KPI</th><th style="padding:6px;border:1px solid var(--border)">実績</th><th style="padding:6px;border:1px solid var(--border)">達成率</th></tr>';
  for(const[cat,cfg] of Object.entries(KPI_CATS)){
    const c=entries.filter(e=>e.category===cat).length;
    let t;if(cfg.perWeek)t=cfg.perWeek*weeks;else t=cfg.total;
    const p=t>0?Math.round(c/t*100):0;
    const clr=p>=100?'var(--green)':p>=70?'var(--yellow)':'var(--red)';
    tbl+=`<tr><td style="padding:6px;border:1px solid var(--border)">${cat}</td><td style="padding:6px;border:1px solid var(--border);font-size:10px;color:var(--text2)">${cfg.kpi}</td><td style="padding:6px;border:1px solid var(--border);text-align:center">${c}/${t}</td><td style="padding:6px;border:1px solid var(--border);text-align:center;color:${clr};font-weight:600">${p}%</td></tr>`;
  }
  tbl+='</table>';
  document.getElementById('kpiSummaryContent').innerHTML=tbl;
  const rv=kpiGetReview(kpiMonth);
  document.getElementById('kpiReviewOwn').value=rv.own||'';
  document.getElementById('kpiReviewCollab').value=rv.collab||'';
  document.getElementById('kpiReviewNext').value=rv.next||'';
  document.getElementById('kpiSummaryModal').classList.add('show');
}

function kpiSaveReview(){
  kpiSetReview(kpiMonth,{own:document.getElementById('kpiReviewOwn').value,collab:document.getElementById('kpiReviewCollab').value,next:document.getElementById('kpiReviewNext').value});
  showToast('振り返りを保存しました','ok');
}

function kpiExportPDF(){
  const entries=kpiGetEntries(kpiMonth);const weeks=kpiWeeksInMonth(kpiMonth);
  const rv=kpiGetReview(kpiMonth);const[y,mo]=kpiMonth.split('-');
  let rows='';
  for(const[cat,cfg] of Object.entries(KPI_CATS)){
    const c=entries.filter(e=>e.category===cat).length;
    let t;if(cfg.perWeek)t=cfg.perWeek*weeks;else t=cfg.total;
    rows+=`<tr><td>${cat}</td><td>${cfg.kpi}</td><td style="text-align:center">${c}/${t}</td><td style="text-align:center">${t>0?Math.round(c/t*100):0}%</td></tr>`;
  }
  let detail='';
  [...entries].sort((a,b)=>a.date.localeCompare(b.date)).forEach(e=>{
    detail+=`<tr><td>${e.date}</td><td>${e.category}</td><td>${e.facility}</td><td>${e.memo||'-'}</td></tr>`;
  });
  const h=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>KPIサマリー ${y}年${mo}月</title>
<style>body{font-family:sans-serif;margin:30px;font-size:13px;}h1{font-size:18px}h2{font-size:14px;margin:20px 0 8px;border-bottom:2px solid #333;padding-bottom:4px}
table{width:100%;border-collapse:collapse;margin-bottom:16px}th,td{border:1px solid #ccc;padding:6px 10px;text-align:left;font-size:12px}th{background:#f0f0f0;font-weight:600}
.rv{margin-top:8px;padding:8px;border:1px solid #ddd;border-radius:4px;white-space:pre-wrap;min-height:30px;font-size:12px;line-height:1.8}
.lb{font-size:12px;font-weight:600;margin-top:10px;margin-bottom:4px}@media print{body{margin:15px}}</style></head><body>
<h1>FY09下期 アクションプラン（${y}年${parseInt(mo)}月）</h1>
<h2>月間実績</h2><table><tr><th>アクションプラン</th><th>KPI</th><th>実績</th><th>達成率</th></tr>${rows}</table>
<h2>活動明細</h2><table><tr><th>日付</th><th>カテゴリ</th><th>施設</th><th>メモ</th></tr>${detail}</table>
<h2>振り返り</h2>
<div class="lb">自身の活動：</div><div class="rv">${rv.own||'（未記入）'}</div>
<div class="lb">他社協業：</div><div class="rv">${rv.collab||'（未記入）'}</div>
<div class="lb">来月の活動計画：</div><div class="rv">${rv.next||'（未記入）'}</div>
</body></html>`;
  const w=window.open('','_blank');w.document.write(h);w.document.close();setTimeout(()=>w.print(),500);
}
