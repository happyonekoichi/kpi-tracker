<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<title>KPI Action Tracker</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiS1BJIEFjdGlvbiBUcmFja2VyIiwic2hvcnRfbmFtZSI6IktQSSIsInN0YXJ0X3VybCI6Ii4iLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3IiOiIjMWExYTJlIiwidGhlbWVfY29sb3IiOiIjMWExYTJlIn0=">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --surface2: #232340;
    --surface3: #2d2d50;
    --text: #e8e8f0;
    --text2: #9999b8;
    --accent1: #ff6b6b;
    --accent2: #4ecdc4;
    --accent3: #ffe66d;
    --cat1: #ff6b6b;
    --cat1bg: rgba(255,107,107,0.12);
    --cat2: #4ecdc4;
    --cat2bg: rgba(78,205,196,0.12);
    --cat3: #ffe66d;
    --cat3bg: rgba(255,230,109,0.12);
    --radius: 14px;
    --shadow: 0 4px 24px rgba(0,0,0,0.3);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
    padding-bottom: 90px;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
    padding: 16px 20px 14px;
    position: sticky; top:0; z-index:100;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
  }
  .header-top { display:flex; justify-content:space-between; align-items:center; }
  .header h1 {
    font-size: 18px; font-weight: 600;
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .month-nav {
    display:flex; align-items:center; gap:12px;
    background: var(--surface3); border-radius: 10px; padding: 6px 12px;
  }
  .month-nav button {
    background:none; border:none; color:var(--text2); font-size:18px; cursor:pointer; padding:4px;
    line-height:1;
  }
  .month-nav span { font-size:13px; font-weight:500; color:var(--text); min-width:70px; text-align:center; }

  /* Tab Nav */
  .tab-bar {
    display:flex; gap:4px; padding:12px 16px 0;
    position: sticky; top: 68px; z-index: 99;
    background: var(--bg);
  }
  .tab {
    flex:1; padding:10px 0; text-align:center; font-size:12px; font-weight:500;
    border:none; border-radius: 10px 10px 0 0; cursor:pointer;
    transition: all 0.2s; color: var(--text2); background: var(--surface);
  }
  .tab.active { color: var(--text); background: var(--surface2); }
  .tab[data-tab="log"].active { border-top: 2px solid var(--accent2); }
  .tab[data-tab="summary"].active { border-top: 2px solid var(--accent1); }
  .tab[data-tab="settings"].active { border-top: 2px solid var(--accent3); }

  /* Content */
  .content { padding: 0 16px 16px; }
  .panel { display:none; }
  .panel.active { display:block; }

  /* KPI Dashboard Cards */
  .kpi-cards { display:flex; flex-direction:column; gap:12px; margin-top:12px; }
  .kpi-card {
    background: var(--surface); border-radius: var(--radius); padding:16px;
    border-left: 3px solid; position:relative; overflow:hidden;
  }
  .kpi-card::after {
    content:''; position:absolute; top:0; right:0; width:80px; height:100%;
    opacity:0.04; border-radius: 0 var(--radius) var(--radius) 0;
  }
  .kpi-card.cat1 { border-left-color: var(--cat1); }
  .kpi-card.cat1::after { background: var(--cat1); }
  .kpi-card.cat2 { border-left-color: var(--cat2); }
  .kpi-card.cat2::after { background: var(--cat2); }
  .kpi-card.cat3 { border-left-color: var(--cat3); }
  .kpi-card.cat3::after { background: var(--cat3); }

  .kpi-card-title { font-size:13px; font-weight:600; margin-bottom:8px; }
  .kpi-card-target { font-size:11px; color:var(--text2); margin-bottom:10px; }
  .kpi-metric { display:flex; align-items:baseline; gap:6px; }
  .kpi-number {
    font-family:'JetBrains Mono',monospace; font-size:32px; font-weight:500;
  }
  .kpi-unit { font-size:12px; color:var(--text2); }
  .kpi-bar { height:4px; background:var(--surface3); border-radius:2px; margin-top:10px; overflow:hidden; }
  .kpi-bar-fill { height:100%; border-radius:2px; transition:width 0.6s ease; }

  /* Activity Log */
  .log-entry {
    background: var(--surface); border-radius: var(--radius); padding:14px 16px;
    margin-top: 10px; position:relative;
  }
  .log-entry-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .log-category {
    font-size:10px; font-weight:600; padding:3px 8px; border-radius:6px;
    text-transform:uppercase; letter-spacing:0.5px;
  }
  .log-category.cat1 { background:var(--cat1bg); color:var(--cat1); }
  .log-category.cat2 { background:var(--cat2bg); color:var(--cat2); }
  .log-category.cat3 { background:var(--cat3bg); color:var(--cat3); }
  .log-date { font-size:11px; color:var(--text2); font-family:'JetBrains Mono',monospace; }
  .log-facility { font-size:14px; font-weight:500; margin-bottom:4px; }
  .log-type { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .log-memo { font-size:12px; color:var(--text2); line-height:1.6; }
  .log-delete {
    position:absolute; top:10px; right:10px; background:none; border:none;
    color:var(--text2); font-size:16px; cursor:pointer; opacity:0.4; padding:4px;
  }
  .log-delete:hover { opacity:1; color:var(--accent1); }

  .log-empty {
    text-align:center; padding:40px 20px; color:var(--text2); font-size:13px;
  }
  .log-empty .icon { font-size:36px; margin-bottom:12px; opacity:0.4; }

  /* FAB */
  .fab {
    position:fixed; bottom:24px; right:20px; z-index:200;
    width:56px; height:56px; border-radius:50%; border:none;
    background: linear-gradient(135deg, var(--accent2), #45b7aa);
    color:#fff; font-size:28px; cursor:pointer;
    box-shadow: 0 4px 20px rgba(78,205,196,0.4);
    transition: transform 0.2s; display:flex; align-items:center; justify-content:center;
  }
  .fab:active { transform:scale(0.92); }

  /* Modal */
  .modal-overlay {
    display:none; position:fixed; inset:0; z-index:300;
    background:rgba(0,0,0,0.6); backdrop-filter:blur(4px);
    align-items:flex-end; justify-content:center;
  }
  .modal-overlay.active { display:flex; }
  .modal {
    background:var(--surface); border-radius: 20px 20px 0 0; width:100%; max-width:480px;
    max-height:85dvh; overflow-y:auto; padding:20px 20px 40px;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }

  .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
  .modal-title { font-size:16px; font-weight:600; }
  .modal-close {
    background:var(--surface3); border:none; color:var(--text2); width:32px; height:32px;
    border-radius:50%; cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center;
  }

  .form-group { margin-bottom: 16px; }
  .form-label { font-size:12px; font-weight:500; color:var(--text2); margin-bottom:8px; display:block; }

  .cat-select { display:flex; gap:8px; }
  .cat-btn {
    flex:1; padding:12px 8px; border-radius:10px; border:2px solid var(--surface3);
    background:var(--surface2); color:var(--text2); cursor:pointer;
    font-size:12px; font-weight:500; text-align:center; transition:all 0.2s;
    font-family:'Noto Sans JP',sans-serif;
  }
  .cat-btn.active.cat1 { border-color:var(--cat1); background:var(--cat1bg); color:var(--cat1); }
  .cat-btn.active.cat2 { border-color:var(--cat2); background:var(--cat2bg); color:var(--cat2); }
  .cat-btn.active.cat3 { border-color:var(--cat3); background:var(--cat3bg); color:var(--cat3); }

  /* Sub-type chips */
  .type-select { display:flex; flex-wrap:wrap; gap:6px; }
  .type-chip {
    padding: 8px 14px; border-radius: 8px; border: 1.5px solid var(--surface3);
    background: var(--surface2); color: var(--text2); cursor: pointer;
    font-size: 12px; transition: all 0.2s; font-family:'Noto Sans JP',sans-serif;
  }
  .type-chip.active { border-color: var(--accent2); background: rgba(78,205,196,0.1); color: var(--accent2); }

  input[type="text"], input[type="date"], textarea, select {
    width:100%; padding:12px 14px; border-radius:10px; border:1.5px solid var(--surface3);
    background:var(--surface2); color:var(--text); font-size:14px;
    font-family:'Noto Sans JP',sans-serif; outline:none; transition:border 0.2s;
  }
  input:focus, textarea:focus, select:focus { border-color:var(--accent2); }
  textarea { resize:vertical; min-height:80px; }

  .btn-submit {
    width:100%; padding:14px; border-radius:12px; border:none;
    background: linear-gradient(135deg, var(--accent2), #45b7aa);
    color:#fff; font-size:15px; font-weight:600; cursor:pointer;
    font-family:'Noto Sans JP',sans-serif;
    transition: opacity 0.2s; margin-top:8px;
  }
  .btn-submit:active { opacity:0.8; }

  /* Summary */
  .summary-section { margin-top:16px; }
  .summary-title { font-size:14px; font-weight:600; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
  .summary-table {
    width:100%; border-collapse:collapse; background:var(--surface); border-radius:var(--radius); overflow:hidden;
  }
  .summary-table th {
    background:var(--surface2); padding:10px 12px; font-size:11px; font-weight:600;
    text-align:left; color:var(--text2);
  }
  .summary-table td { padding:10px 12px; font-size:13px; border-top:1px solid var(--surface3); }
  .summary-table .num { font-family:'JetBrains Mono',monospace; font-weight:500; text-align:center; }

  .review-area {
    background:var(--surface); border-radius:var(--radius); padding:16px; margin-top:16px;
  }
  .review-area label { font-size:12px; color:var(--text2); display:block; margin-bottom:8px; }
  .review-area textarea { min-height:100px; }
  .review-save {
    margin-top:10px; padding:10px 20px; border-radius:8px; border:none;
    background:var(--accent2); color:#fff; font-size:13px; font-weight:500;
    cursor:pointer; font-family:'Noto Sans JP',sans-serif;
  }

  /* Settings */
  .settings-section { margin-top:16px; }
  .settings-btn {
    width:100%; padding:14px 16px; border-radius:var(--radius); border:none;
    background:var(--surface); color:var(--text); font-size:14px; text-align:left;
    cursor:pointer; margin-bottom:8px; display:flex; align-items:center; gap:12px;
    font-family:'Noto Sans JP',sans-serif;
  }
  .settings-btn .icon { font-size:20px; }
  .settings-btn .label { flex:1; }
  .settings-btn .arrow { color:var(--text2); }
  .settings-btn:active { background:var(--surface2); }
  .settings-btn.danger { color:var(--accent1); }

  .facility-list { margin-top: 12px; }
  .facility-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; background: var(--surface); border-radius: 10px; margin-bottom: 6px;
    font-size: 13px;
  }
  .facility-del { background:none; border:none; color:var(--text2); cursor:pointer; font-size:16px; padding:4px; }
  .facility-add-row { display:flex; gap:8px; margin-top:8px; }
  .facility-add-row input { flex:1; }
  .facility-add-row button {
    padding:10px 16px; border-radius:10px; border:none;
    background:var(--accent2); color:#fff; font-weight:500; cursor:pointer;
    font-family:'Noto Sans JP',sans-serif; font-size:13px; white-space:nowrap;
  }

  /* Weekly bar mini chart */
  .week-bars { display:flex; gap:4px; align-items:flex-end; height:40px; margin-top:8px; }
  .week-bar {
    flex:1; border-radius:3px 3px 0 0; min-height:3px; transition:height 0.4s ease;
  }
  .week-label { display:flex; gap:4px; margin-top:2px; }
  .week-label span { flex:1; text-align:center; font-size:8px; color:var(--text2); font-family:'JetBrains Mono',monospace; }

  /* Toast */
  .toast {
    position:fixed; bottom:100px; left:50%; transform:translateX(-50%);
    background:var(--surface2); color:var(--text); padding:10px 20px;
    border-radius:10px; font-size:13px; z-index:400; opacity:0;
    transition:opacity 0.3s; pointer-events:none; box-shadow:var(--shadow);
    border:1px solid var(--surface3);
  }
  .toast.show { opacity:1; }

  /* PDF hidden */
  @media print {
    body { background:#fff; color:#000; padding:20px; }
    .header, .tab-bar, .fab, .modal-overlay, .toast { display:none !important; }
    .panel { display:block !important; }
    .kpi-card { border:1px solid #ddd; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>KPI Action Tracker</h1>
      <div class="header-sub">FY09下期 アクションプラン</div>
    </div>
    <div class="month-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <span id="monthLabel"></span>
      <button onclick="changeMonth(1)">›</button>
    </div>
  </div>
</div>

<div class="tab-bar">
  <button class="tab active" data-tab="log" onclick="switchTab('log')">📋 ログ</button>
  <button class="tab" data-tab="summary" onclick="switchTab('summary')">📊 サマリー</button>
  <button class="tab" data-tab="settings" onclick="switchTab('settings')">⚙️ 設定</button>
</div>

<div class="content">
  <!-- LOG PANEL -->
  <div class="panel active" id="panel-log">
    <div class="kpi-cards" id="kpiCards"></div>
    <div id="logList"></div>
  </div>

  <!-- SUMMARY PANEL -->
  <div class="panel" id="panel-summary">
    <div class="summary-section">
      <div class="summary-title">📊 月間実績サマリー</div>
      <table class="summary-table" id="summaryTable"></table>
    </div>
    <div class="summary-section">
      <div class="summary-title">📈 週別推移</div>
      <div id="weeklyChart"></div>
    </div>
    <div class="review-area">
      <label>📝 活動振り返り（自身の活動）</label>
      <textarea id="reviewOwn" placeholder="今月の自身の活動を振り返り..."></textarea>
      <label style="margin-top:12px;">🤝 他社協業</label>
      <textarea id="reviewCollab" placeholder="他社協業の状況..."></textarea>
      <label style="margin-top:12px;">📋 来月の活動計画</label>
      <textarea id="reviewNext" placeholder="来月やること..."></textarea>
      <button class="review-save" onclick="saveReview()">振り返りを保存</button>
    </div>
  </div>

  <!-- SETTINGS PANEL -->
  <div class="panel" id="panel-settings">
    <div class="settings-section">
      <div class="summary-title">🏥 施設リスト管理</div>
      <div class="facility-list" id="facilityList"></div>
      <div class="facility-add-row">
        <input type="text" id="newFacility" placeholder="施設名を入力">
        <button onclick="addFacility()">追加</button>
      </div>
    </div>
    <div class="settings-section" style="margin-top:24px;">
      <div class="summary-title">💾 データ管理</div>
      <button class="settings-btn" onclick="exportJSON()">
        <span class="icon">📤</span><span class="label">JSONエクスポート</span><span class="arrow">›</span>
      </button>
      <button class="settings-btn" onclick="document.getElementById('importFile').click()">
        <span class="icon">📥</span><span class="label">JSONインポート</span><span class="arrow">›</span>
      </button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
      <button class="settings-btn" onclick="exportPDF()">
        <span class="icon">📄</span><span class="label">サマリーPDF出力</span><span class="arrow">›</span>
      </button>
      <button class="settings-btn danger" onclick="confirmClear()">
        <span class="icon">🗑️</span><span class="label">当月データをクリア</span><span class="arrow">›</span>
      </button>
    </div>
    <div class="settings-section" style="margin-top:24px;">
      <div class="summary-title">ℹ️ アプリ情報</div>
      <div style="font-size:12px;color:var(--text2);padding:12px;background:var(--surface);border-radius:var(--radius);line-height:1.8;">
        KPI Action Tracker v1.0<br>
        データはこの端末のブラウザに保存されます。<br>
        定期的にJSONエクスポートでバックアップを取ってください。<br>
        ホーム画面に追加すると、アプリのように使えます。
      </div>
    </div>
  </div>
</div>

<button class="fab" onclick="openModal()">＋</button>

<!-- ADD ENTRY MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalBg(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">活動を記録</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="form-group">
      <label class="form-label">カテゴリ</label>
      <div class="cat-select">
        <button class="cat-btn cat1" data-cat="案件創出" onclick="selectCat(this)">案件創出</button>
        <button class="cat-btn cat2" data-cat="案件進展" onclick="selectCat(this)">案件進展</button>
        <button class="cat-btn cat3" data-cat="予算申請" onclick="selectCat(this)">予算申請</button>
      </div>
    </div>
    <div class="form-group" id="typeGroup" style="display:none;">
      <label class="form-label">活動タイプ</label>
      <div class="type-select" id="typeSelect"></div>
    </div>
    <div class="form-group">
      <label class="form-label">日付</label>
      <input type="date" id="entryDate">
    </div>
    <div class="form-group">
      <label class="form-label">施設名</label>
      <input type="text" id="entryFacility" list="facilityDatalist" placeholder="施設名を入力または選択">
      <datalist id="facilityDatalist"></datalist>
    </div>
    <div class="form-group">
      <label class="form-label">メモ（任意）</label>
      <textarea id="entryMemo" placeholder="活動内容の詳細..."></textarea>
    </div>
    <button class="btn-submit" onclick="saveEntry()">記録する</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── State ─────────────────────
let currentMonth = new Date().toISOString().slice(0,7); // "YYYY-MM"
let selectedCat = null;
let selectedType = null;

const CATEGORIES = {
  '案件創出': { color:'cat1', kpi:'週5件の新規案件創出活動', targetPerWeek:5 },
  '案件進展': { color:'cat2', kpi:'週2件の案件フェーズの進展', targetPerWeek:2 },
  '予算申請': { color:'cat3', kpi:'8月までに予算申請可能施設を3件', targetTotal:3 },
};

const ACTIVITY_TYPES = {
  '案件創出': ['新規訪問','電話アプローチ','紹介依頼','セミナー集客','Web問合せ対応','他社協業','その他'],
  '案件進展': ['デモ実施','見積提出','トライアル','院内検討会','フォロー訪問','他社協業','その他'],
  '予算申請': ['予算ヒアリング','申請書作成支援','事務方面談','院長面談','他社協業','その他'],
};

// ─── Storage helpers ─────────────────────
function storageKey(month) { return `kpi_entries_${month}`; }
function getEntries(month) {
  try { return JSON.parse(localStorage.getItem(storageKey(month))) || []; }
  catch { return []; }
}
function setEntries(month, entries) {
  localStorage.setItem(storageKey(month), JSON.stringify(entries));
}
function getReview(month) {
  try { return JSON.parse(localStorage.getItem(`kpi_review_${month}`)) || {}; }
  catch { return {}; }
}
function setReview(month, data) {
  localStorage.setItem(`kpi_review_${month}`, JSON.stringify(data));
}
function getFacilities() {
  try { return JSON.parse(localStorage.getItem('kpi_facilities')) || []; }
  catch { return []; }
}
function setFacilities(list) { localStorage.setItem('kpi_facilities', JSON.stringify(list)); }

// ─── Month navigation ─────────────────────
function changeMonth(delta) {
  const d = new Date(currentMonth + '-01');
  d.setMonth(d.getMonth() + delta);
  currentMonth = d.toISOString().slice(0,7);
  renderAll();
}

// ─── Tab switching ─────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === `panel-${tab}`));
  if (tab === 'summary') renderSummary();
  if (tab === 'settings') renderFacilities();
}

// ─── Render all ─────────────────────
function renderAll() {
  const [y,m] = currentMonth.split('-');
  document.getElementById('monthLabel').textContent = `${y}/${m}`;
  renderKPICards();
  renderLogList();
}

// ─── KPI Cards ─────────────────────
function renderKPICards() {
  const entries = getEntries(currentMonth);
  const weeksInMonth = getWeeksInMonth(currentMonth);
  let html = '';

  for (const [cat, cfg] of Object.entries(CATEGORIES)) {
    const count = entries.filter(e => e.category === cat).length;
    let progress, display, target;

    if (cfg.targetPerWeek) {
      const totalTarget = cfg.targetPerWeek * weeksInMonth;
      progress = totalTarget > 0 ? Math.min(count / totalTarget * 100, 100) : 0;
      const weeklyAvg = weeksInMonth > 0 ? (count / weeksInMonth).toFixed(1) : 0;
      display = count;
      target = `目標: 週${cfg.targetPerWeek}件 (月${totalTarget}件) ／ 週平均 ${weeklyAvg}件`;
    } else {
      progress = Math.min(count / cfg.targetTotal * 100, 100);
      display = count;
      target = `目標: ${cfg.targetTotal}件 ／ 残り ${Math.max(cfg.targetTotal - count, 0)}件`;
    }

    // Weekly bars
    const weekData = getWeeklyData(currentMonth, cat);
    let barsHtml = '<div class="week-bars">';
    let labelsHtml = '<div class="week-label">';
    const maxVal = Math.max(...weekData.map(w=>w.count), 1);
    weekData.forEach((w,i) => {
      const h = (w.count / maxVal) * 36 + 4;
      const c = cfg.color === 'cat1' ? 'var(--cat1)' : cfg.color === 'cat2' ? 'var(--cat2)' : 'var(--cat3)';
      barsHtml += `<div class="week-bar" style="height:${h}px;background:${c};"></div>`;
      labelsHtml += `<span>W${i+1}</span>`;
    });
    barsHtml += '</div>';
    labelsHtml += '</div>';

    html += `
      <div class="kpi-card ${cfg.color}">
        <div class="kpi-card-title">${cat}</div>
        <div class="kpi-card-target">${target}</div>
        <div class="kpi-metric">
          <span class="kpi-number" style="color:var(--${cfg.color})">${display}</span>
          <span class="kpi-unit">件</span>
        </div>
        <div class="kpi-bar"><div class="kpi-bar-fill" style="width:${progress}%;background:var(--${cfg.color})"></div></div>
        ${barsHtml}${labelsHtml}
      </div>
    `;
  }
  document.getElementById('kpiCards').innerHTML = html;
}

// ─── Log list ─────────────────────
function renderLogList() {
  const entries = getEntries(currentMonth).sort((a,b) => b.date.localeCompare(a.date) || b.id - a.id);
  if (entries.length === 0) {
    document.getElementById('logList').innerHTML = `
      <div class="log-empty">
        <div class="icon">📝</div>
        <div>まだ活動記録がありません。<br>＋ボタンで記録を始めましょう</div>
      </div>`;
    return;
  }
  let html = '';
  let lastDate = '';
  entries.forEach(e => {
    const dateLabel = e.date;
    if (dateLabel !== lastDate) {
      const d = new Date(e.date + 'T00:00:00');
      const dow = ['日','月','火','水','木','金','土'][d.getDay()];
      html += `<div style="font-size:11px;color:var(--text2);margin-top:16px;margin-bottom:4px;padding-left:4px;">${dateLabel} (${dow})</div>`;
      lastDate = dateLabel;
    }
    const cfg = CATEGORIES[e.category] || { color:'cat1' };
    html += `
      <div class="log-entry">
        <button class="log-delete" onclick="deleteEntry(${e.id})" title="削除">×</button>
        <div class="log-entry-header">
          <span class="log-category ${cfg.color}">${e.category}</span>
          <span class="log-date">${e.date}</span>
        </div>
        <div class="log-facility">${escHtml(e.facility)}</div>
        ${e.type ? `<div class="log-type">🏷️ ${escHtml(e.type)}</div>` : ''}
        ${e.memo ? `<div class="log-memo">${escHtml(e.memo)}</div>` : ''}
      </div>
    `;
  });
  document.getElementById('logList').innerHTML = html;
}

// ─── Modal ─────────────────────
function openModal() {
  selectedCat = null;
  selectedType = null;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('typeGroup').style.display = 'none';
  document.getElementById('entryDate').value = new Date().toISOString().slice(0,10);
  document.getElementById('entryFacility').value = '';
  document.getElementById('entryMemo').value = '';
  updateFacilityDatalist();
  document.getElementById('modalOverlay').classList.add('active');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
function closeModalBg(e) { if (e.target === e.currentTarget) closeModal(); }

function selectCat(btn) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedCat = btn.dataset.cat;
  selectedType = null;

  // Show activity type chips
  const types = ACTIVITY_TYPES[selectedCat] || [];
  const container = document.getElementById('typeSelect');
  container.innerHTML = types.map(t =>
    `<button class="type-chip" onclick="selectType(this, '${t}')">${t}</button>`
  ).join('');
  document.getElementById('typeGroup').style.display = types.length ? 'block' : 'none';
}

function selectType(btn, type) {
  document.querySelectorAll('.type-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  selectedType = type;
}

function saveEntry() {
  if (!selectedCat) { showToast('カテゴリを選択してください'); return; }
  const date = document.getElementById('entryDate').value;
  const facility = document.getElementById('entryFacility').value.trim();
  if (!facility) { showToast('施設名を入力してください'); return; }
  if (!date) { showToast('日付を入力してください'); return; }

  const month = date.slice(0,7);
  const entries = getEntries(month);
  entries.push({
    id: Date.now(),
    category: selectedCat,
    type: selectedType || '',
    date, facility,
    memo: document.getElementById('entryMemo').value.trim()
  });
  setEntries(month, entries);

  // Auto-add facility
  const facs = getFacilities();
  if (!facs.includes(facility)) { facs.push(facility); setFacilities(facs); }

  if (month === currentMonth) renderAll();
  closeModal();
  showToast('✓ 記録しました');
}

function deleteEntry(id) {
  if (!confirm('この記録を削除しますか？')) return;
  const entries = getEntries(currentMonth).filter(e => e.id !== id);
  setEntries(currentMonth, entries);
  renderAll();
  showToast('削除しました');
}

// ─── Summary ─────────────────────
function renderSummary() {
  const entries = getEntries(currentMonth);
  const weeks = getWeeksInMonth(currentMonth);

  let tableHtml = `<tr><th>アクションプラン</th><th>KPI</th><th>実績</th><th>達成率</th></tr>`;
  for (const [cat, cfg] of Object.entries(CATEGORIES)) {
    const count = entries.filter(e => e.category === cat).length;
    let target, pct;
    if (cfg.targetPerWeek) {
      target = cfg.targetPerWeek * weeks;
      pct = target > 0 ? Math.round(count / target * 100) : 0;
    } else {
      target = cfg.targetTotal;
      pct = Math.round(count / target * 100);
    }
    const color = pct >= 100 ? 'var(--accent2)' : pct >= 70 ? 'var(--accent3)' : 'var(--accent1)';
    tableHtml += `<tr>
      <td>${cat}</td>
      <td style="font-size:11px;color:var(--text2)">${cfg.kpi}</td>
      <td class="num">${count}/${target}</td>
      <td class="num" style="color:${color};font-weight:600">${pct}%</td>
    </tr>`;
  }
  document.getElementById('summaryTable').innerHTML = tableHtml;

  // Weekly chart per category
  let chartHtml = '';
  for (const [cat, cfg] of Object.entries(CATEGORIES)) {
    const weekData = getWeeklyData(currentMonth, cat);
    const maxVal = Math.max(...weekData.map(w=>w.count), 1);
    const c = cfg.color === 'cat1' ? 'var(--cat1)' : cfg.color === 'cat2' ? 'var(--cat2)' : 'var(--cat3)';
    const targetLine = cfg.targetPerWeek || 0;

    chartHtml += `<div style="margin-bottom:16px;background:var(--surface);border-radius:var(--radius);padding:14px;">
      <div style="font-size:12px;font-weight:500;margin-bottom:8px;">${cat}</div>
      <div style="display:flex;gap:6px;align-items:flex-end;height:50px;">`;
    weekData.forEach((w,i) => {
      const h = (w.count / Math.max(maxVal, targetLine)) * 44 + 6;
      chartHtml += `<div style="flex:1;text-align:center;">
        <div style="font-size:10px;color:var(--text2);margin-bottom:4px;font-family:'JetBrains Mono',monospace;">${w.count}</div>
        <div style="height:${h}px;background:${c};border-radius:3px 3px 0 0;margin:0 auto;width:80%;"></div>
      </div>`;
    });
    chartHtml += `</div><div style="display:flex;gap:6px;">`;
    weekData.forEach((w,i) => {
      chartHtml += `<div style="flex:1;text-align:center;font-size:9px;color:var(--text2);margin-top:3px;">W${i+1}</div>`;
    });
    if (targetLine) {
      chartHtml += `</div><div style="font-size:10px;color:var(--text2);margin-top:6px;">目標ライン: 週${targetLine}件</div>`;
    }
    chartHtml += `</div>`;
  }
  document.getElementById('weeklyChart').innerHTML = chartHtml;

  // Load review
  const review = getReview(currentMonth);
  document.getElementById('reviewOwn').value = review.own || '';
  document.getElementById('reviewCollab').value = review.collab || '';
  document.getElementById('reviewNext').value = review.next || '';
}

function saveReview() {
  setReview(currentMonth, {
    own: document.getElementById('reviewOwn').value,
    collab: document.getElementById('reviewCollab').value,
    next: document.getElementById('reviewNext').value,
  });
  showToast('✓ 振り返りを保存しました');
}

// ─── Facilities ─────────────────────
function renderFacilities() {
  const facs = getFacilities();
  const html = facs.map((f,i) =>
    `<div class="facility-item"><span>${escHtml(f)}</span><button class="facility-del" onclick="removeFacility(${i})">×</button></div>`
  ).join('');
  document.getElementById('facilityList').innerHTML = html || '<div style="font-size:12px;color:var(--text2);padding:8px;">施設が未登録です。活動記録時に自動追加されます。</div>';
}
function addFacility() {
  const input = document.getElementById('newFacility');
  const name = input.value.trim();
  if (!name) return;
  const facs = getFacilities();
  if (!facs.includes(name)) { facs.push(name); setFacilities(facs); }
  input.value = '';
  renderFacilities();
  showToast('施設を追加しました');
}
function removeFacility(i) {
  const facs = getFacilities();
  facs.splice(i,1);
  setFacilities(facs);
  renderFacilities();
}
function updateFacilityDatalist() {
  const dl = document.getElementById('facilityDatalist');
  dl.innerHTML = getFacilities().map(f => `<option value="${escHtml(f)}">`).join('');
}

// ─── Export / Import ─────────────────────
function exportJSON() {
  const data = {};
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key.startsWith('kpi_')) {
      data[key] = JSON.parse(localStorage.getItem(key));
    }
  }
  const blob = new Blob([JSON.stringify(data, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `kpi_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('JSONエクスポート完了');
}

function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      let count = 0;
      for (const [key, val] of Object.entries(data)) {
        if (key.startsWith('kpi_')) {
          localStorage.setItem(key, JSON.stringify(val));
          count++;
        }
      }
      renderAll();
      showToast(`${count}件のデータをインポートしました`);
    } catch { showToast('ファイルの読み込みに失敗しました'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

  h1{font-size:18px;margin-bottom:4px;} h2{font-size:14px;margin:20px 0 8px;border-bottom:2px solid #333;padding-bottom:4px;}
  table{width:100%;border-collapse:collapse;margin-bottom:16px;}
  th,td{border:1px solid #ccc;padding:6px 10px;text-align:left;font-size:12px;}
  th{background:#f0f0f0;font-weight:600;}
  .review{margin-top:12px;padding:10px;border:1px solid #ddd;border-radius:4px;white-space:pre-wrap;min-height:40px;font-size:12px;line-height:1.8;}
  .label{font-size:12px;font-weight:600;margin-top:12px;margin-bottom:4px;}

<div class="label">自身の活動：</div><div class="review">${escHtml(review.own || '（未記入）')}</div>
<div class="label">他社協業：</div><div class="review">${escHtml(review.collab || '（未記入）')}</div>
<div class="label">来月の活動計画：</div><div class="review">${escHtml(review.next || '（未記入）')}</div>

  const win = window.open('', '_blank');

function confirmClear() {
  const [y,m] = currentMonth.split('-');
  if (confirm(`${y}年${parseInt(m)}月のデータをすべて削除しますか？\nこの操作は取り消せません。`)) {
    localStorage.removeItem(storageKey(currentMonth));
    localStorage.removeItem(`kpi_review_${currentMonth}`);
    renderAll();
    showToast('当月データを削除しました');
  }
}

// ─── Helpers ─────────────────────
function getWeeksInMonth(month) {
  const [y,m] = month.split('-').map(Number);
  const days = new Date(y, m, 0).getDate();
  return Math.ceil(days / 7);
}

function getWeeklyData(month, category) {
  const [y,m] = month.split('-').map(Number);
  const entries = getEntries(month).filter(e => e.category === category);
  const daysInMonth = new Date(y, m, 0).getDate();
  const weeks = [];
  for (let d = 1; d <= daysInMonth; d += 7) {
    const start = d;
    const end = Math.min(d + 6, daysInMonth);
    const count = entries.filter(e => {
      const day = parseInt(e.date.split('-')[2]);
      return day >= start && day <= end;
    }).length;
    weeks.push({ start, end, count });
  }
  return weeks;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ─── Init ─────────────────────
renderAll();
</script>
